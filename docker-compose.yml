version: "3.8"

services:
  postgres:
    image: docker.iranserver.com/postgres:${POSTGRES_VERSION}
    container_name: safechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - safechat

  synapse:
    image: docker.iranserver.com/matrixdotorg/synapse:${SYNAPSE_VERSION}
    container_name: safechat-synapse
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_IP: ${SERVER_IP}
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./synapse/data:/data
    networks:
      - safechat

  element:
    image: docker.iranserver.com/vectorim/element-web:${ELEMENT_VERSION}
    container_name: safechat-element
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - safechat

  synapse-admin:
    image: docker.iranserver.com/awesometechnologies/synapse-admin:${SYNAPSE_ADMIN_VERSION}
    container_name: safechat-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - safechat

  nginx:
    image: docker.iranserver.com/nginx:${NGINX_VERSION}
    container_name: safechat-nginx
    restart: unless-stopped
    depends_on:
      - synapse
      - element
    ports:
      - "80:80"
      - "8448:8448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - safechat

networks:
  safechat:
    driver: bridge
