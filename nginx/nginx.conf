events {}

http {
    server {
        listen 80;
        server_name _;

        # Element Web UI
        location / {
            proxy_pass http://element:80;
            proxy_set_header Host $host;
        }

        # Matrix client API
        location /_matrix {
            proxy_pass http://synapse:8008;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            client_max_body_size 50M;
        }

        # Synapse admin API
        location /_synapse {
            proxy_pass http://synapse:8008;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $host;
        }
    }

    # Admin panel
    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://synapse-admin:80;
            proxy_set_header Host $host;
        }
    }

    # Federation port
    server {
        listen 8448;
        server_name _;

        location / {
            proxy_pass http://synapse:8008;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $host;
        }
    }
}